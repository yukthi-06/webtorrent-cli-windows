name: Build Windows EXE

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-exe:
    name: Build Windows x64 EXE
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build CJS Bundle
        run: |
          mkdir -p dist
          cp bin/ascii-logo.txt dist/ascii-logo.txt
          npx esbuild bin/cmd.js --bundle --platform=node --format=cjs --outfile=dist/webtorrent-cli-windows.cjs --packages=external

      - name: Update package.json Entrypoint
        run: |
          node -e "import('fs').then(fs => { const p = JSON.parse(fs.readFileSync('./package.json', 'utf8')); p.bin.webtorrent = './dist/webtorrent-cli-windows.cjs'; fs.writeFileSync('./package.json', JSON.stringify(p, null, 2)); })"

      - name: Build EXE
        run: npx pkg . --targets node18-win-x64 --output dist/webtorrent-cli-windows.exe

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: webtorrent-windows-x64
          path: dist/webtorrent-cli-windows.exe
